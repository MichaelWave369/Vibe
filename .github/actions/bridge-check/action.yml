name: "Vibe Bridge Check"
description: "Run deterministic Vibe bridge verification over .vibe files in CI"
author: "Vibe"
inputs:
  files:
    description: "Glob for .vibe files"
    required: false
    default: "**/*.vibe"
  fail-on:
    description: "Comma-separated fail conditions (e.g. ENTROPY_NOISE,bridge_score_below_threshold:0.9)"
    required: false
    default: ""
  report-json-path:
    description: "Path for machine-readable JSON report"
    required: false
    default: ".vibe_ci/bridge_report.json"
  backend:
    description: "Verification backend"
    required: false
    default: "heuristic"
  fallback-backend:
    description: "Optional fallback backend"
    required: false
    default: ""
  with-proofs:
    description: "Write proof artifacts"
    required: false
    default: "false"
  with-tests:
    description: "Generate intent-guided tests"
    required: false
    default: "false"
outputs:
  files_checked:
    description: "Total .vibe files checked"
  files_failed:
    description: "Total files that failed verification or fail-on gating"
  worst_bridge_score:
    description: "Worst bridge score across checked files"
  report_json_path:
    description: "Path to deterministic JSON report"
  summary_markdown_path:
    description: "Path to markdown summary"
  proof_paths:
    description: "JSON array of proof artifact paths"
runs:
  using: "composite"
  steps:
    - name: Run Vibe bridge check
      shell: bash
      run: |
        python .github/actions/bridge-check/run_bridge_check.py
